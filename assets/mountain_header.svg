<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="40%" stop-color="#0d0a2e"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <!-- Aurora gradient 1 -->
    <linearGradient id="aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5cc" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00bfff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b00ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Aurora gradient 2 -->
    <linearGradient id="aurora2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7f00ff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00e5cc" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#00ff88" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00bfff" stop-opacity="0"/>
    </linearGradient>
    <!-- Glacier glow -->
    <linearGradient id="glacier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a0e8ff"/>
      <stop offset="100%" stop-color="#5bc8e8"/>
    </linearGradient>
    <!-- River gradient -->
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5cc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0077aa" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Snow gradient -->
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff6ff"/>
      <stop offset="100%" stop-color="#8dc8e0" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="auroraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="riverGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="280" fill="url(#sky)"/>

  <!-- Stars -->
  <g opacity="0.8">
    <circle cx="50" cy="20" r="0.8" fill="white" opacity="0.9"/>
    <circle cx="120" cy="35" r="1" fill="white" opacity="0.7"/>
    <circle cx="200" cy="15" r="0.7" fill="white" opacity="0.8"/>
    <circle cx="310" cy="28" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="390" cy="12" r="0.8" fill="white" opacity="0.9"/>
    <circle cx="450" cy="40" r="0.6" fill="white" opacity="0.7"/>
    <circle cx="520" cy="18" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="600" cy="8" r="0.7" fill="white" opacity="0.6"/>
    <circle cx="680" cy="30" r="0.9" fill="white" opacity="0.9"/>
    <circle cx="750" cy="15" r="0.8" fill="white" opacity="0.7"/>
    <circle cx="830" cy="25" r="0.6" fill="white" opacity="0.8"/>
    <circle cx="910" cy="10" r="1" fill="white" opacity="0.6"/>
    <circle cx="980" cy="38" r="0.8" fill="white" opacity="0.9"/>
    <circle cx="1050" cy="20" r="0.7" fill="white" opacity="0.7"/>
    <circle cx="1130" cy="32" r="0.9" fill="white" opacity="0.8"/>
    <circle cx="160" cy="55" r="0.6" fill="white" opacity="0.5"/>
    <circle cx="700" cy="45" r="0.7" fill="white" opacity="0.6"/>
    <circle cx="870" cy="50" r="0.8" fill="white" opacity="0.5"/>
  </g>

  <!-- Aurora Borealis - back layer (blurred) -->
  <g filter="url(#auroraGlow)" opacity="0.6">
    <path d="M0,60 Q200,20 400,55 Q600,90 800,40 Q1000,5 1200,50" stroke="url(#aurora1)" stroke-width="30" fill="none"/>
    <path d="M0,90 Q300,45 550,80 Q750,110 950,60 Q1100,30 1200,70" stroke="url(#aurora2)" stroke-width="20" fill="none"/>
  </g>
  <!-- Aurora Borealis - front layer -->
  <g opacity="0.45">
    <path d="M0,60 Q200,20 400,55 Q600,90 800,40 Q1000,5 1200,50" stroke="url(#aurora1)" stroke-width="12" fill="none"/>
    <path d="M0,90 Q300,45 550,80 Q750,110 950,60 Q1100,30 1200,70" stroke="url(#aurora2)" stroke-width="8" fill="none"/>
    <path d="M100,70 Q350,35 600,65 Q850,95 1100,45" stroke="#00ffaa" stroke-width="3" fill="none" opacity="0.4"/>
  </g>

  <!-- Background far mountains (snowy, pale) -->
  <g opacity="0.55">
    <polygon points="0,200 80,110 150,165 220,95 310,160 390,100 470,155 540,105 620,158 700,108 780,155 860,98 940,150 1020,105 1100,148 1200,110 1200,200" fill="#1a2a3a"/>
    <!-- Snow caps far -->
    <polygon points="80,110 95,130 65,130" fill="url(#snow)" opacity="0.7"/>
    <polygon points="220,95 240,120 200,120" fill="url(#snow)" opacity="0.7"/>
    <polygon points="390,100 412,128 368,128" fill="url(#snow)" opacity="0.7"/>
    <polygon points="540,105 558,130 522,130" fill="url(#snow)" opacity="0.7"/>
    <polygon points="700,108 720,133 680,133" fill="url(#snow)" opacity="0.7"/>
    <polygon points="860,98 882,128 838,128" fill="url(#snow)" opacity="0.7"/>
    <polygon points="1020,105 1040,130 1000,130" fill="url(#snow)" opacity="0.7"/>
  </g>

  <!-- Mid mountains (dark, with glaciers) -->
  <g>
    <!-- Main mountain range -->
    <polygon points="0,230 100,130 180,190 260,100 360,175 440,108 530,180 610,120 700,185 780,115 870,178 950,105 1040,170 1120,125 1200,160 1200,230" fill="#0f1e2e"/>
    <!-- Glacier patches on mid mountains -->
    <path d="M260,100 L280,130 L300,115 L275,140 L245,125 Z" fill="url(#glacier)" opacity="0.65"/>
    <path d="M440,108 L460,138 L478,120 L455,148 L425,130 Z" fill="url(#glacier)" opacity="0.6"/>
    <path d="M610,120 L630,150 L648,133 L625,158 L600,142 Z" fill="url(#glacier)" opacity="0.65"/>
    <path d="M780,115 L800,145 L818,128 L796,155 L768,138 Z" fill="url(#glacier)" opacity="0.6"/>
    <path d="M950,105 L970,135 L988,118 L966,145 L940,128 Z" fill="url(#glacier)" opacity="0.65"/>

    <!-- Snow caps mid -->
    <polygon points="100,130 118,158 82,158" fill="url(#snow)"/>
    <polygon points="260,100 282,135 238,135" fill="url(#snow)"/>
    <polygon points="440,108 462,140 418,140" fill="url(#snow)"/>
    <polygon points="610,120 632,152 588,152" fill="url(#snow)"/>
    <polygon points="780,115 802,148 758,148" fill="url(#snow)"/>
    <polygon points="950,105 972,140 928,140" fill="url(#snow)"/>
    <polygon points="1120,125 1140,155 1100,155" fill="url(#snow)"/>
  </g>

  <!-- Glacier river in valley (glowing teal) -->
  <g filter="url(#riverGlow)" opacity="0.9">
    <path d="M0,255 Q80,240 160,252 Q250,265 340,248 Q420,235 510,250 Q600,262 690,245 Q780,232 870,248 Q960,260 1050,244 Q1130,232 1200,245" stroke="url(#river)" stroke-width="8" fill="none"/>
    <path d="M0,258 Q80,244 160,256 Q250,268 340,251 Q420,238 510,253 Q600,265 690,248 Q780,235 870,251 Q960,263 1050,247 Q1130,235 1200,248" stroke="#00e5cc" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Foreground dark pine forest -->
  <g fill="#05111a">
    <!-- Left cluster -->
    <polygon points="0,280 12,230 24,280"/>
    <polygon points="8,280 22,215 36,280"/>
    <polygon points="20,280 35,225 50,280"/>
    <polygon points="35,280 50,210 65,280"/>
    <polygon points="48,280 63,220 78,280"/>
    <polygon points="60,280 76,205 92,280"/>
    <polygon points="75,280 90,215 105,280"/>
    <polygon points="88,280 103,222 118,280"/>
    <!-- Mid-left -->
    <polygon points="150,280 165,218 180,280"/>
    <polygon points="165,280 180,208 195,280"/>
    <polygon points="178,280 193,220 208,280"/>
    <polygon points="195,280 210,225 225,280"/>
    <!-- Mid -->
    <polygon points="380,280 394,215 408,280"/>
    <polygon points="395,280 410,205 425,280"/>
    <polygon points="408,280 423,218 438,280"/>
    <!-- Right-mid -->
    <polygon points="600,280 614,212 628,280"/>
    <polygon points="615,280 630,202 645,280"/>
    <polygon points="630,280 645,215 660,280"/>
    <polygon points="645,280 660,208 675,280"/>
    <!-- Right cluster -->
    <polygon points="900,280 914,218 928,280"/>
    <polygon points="915,280 930,208 945,280"/>
    <polygon points="930,280 945,220 960,280"/>
    <polygon points="945,280 960,225 975,280"/>
    <!-- Far right -->
    <polygon points="1080,280 1094,215 1108,280"/>
    <polygon points="1095,280 1110,205 1125,280"/>
    <polygon points="1110,280 1125,218 1140,280"/>
    <polygon points="1150,280 1165,210 1180,280"/>
    <polygon points="1165,280 1180,200 1195,280"/>
    <polygon points="1180,280 1195,215 1210,280"/>
  </g>

  <!-- Foreground ground -->
  <rect x="0" y="268" width="1200" height="12" fill="#03090f" opacity="0.8"/>

  <!-- Bottom fade -->
  <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#03090f" stop-opacity="0"/>
    <stop offset="100%" stop-color="#03090f" stop-opacity="1"/>
  </linearGradient>
  <rect x="0" y="240" width="1200" height="40" fill="url(#bottomFade)"/>

  <!-- Glowing moon -->
  <circle cx="1100" cy="55" r="18" fill="#fff8e0" opacity="0.9" filter="url(#glow)"/>
  <circle cx="1100" cy="55" r="22" fill="#fffce0" opacity="0.15" filter="url(#auroraGlow)"/>
</svg>
