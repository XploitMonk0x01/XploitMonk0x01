<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');

      .pulse { animation: pulse 3s ease-in-out infinite alternate; }
      @keyframes pulse {
        0%   { opacity: 0.6; filter: drop-shadow(0 0 4px #00e5cc); }
        100% { opacity: 1.0; filter: drop-shadow(0 0 10px #00e5cc); }
      }
      .pulse2 { animation: pulse 3.5s ease-in-out infinite alternate; }
      .pulse3 { animation: pulse 4s ease-in-out infinite alternate; }
      .pulse4 { animation: pulse 2.8s ease-in-out infinite alternate; }

      .grow { animation: grow 2s ease-out forwards; transform-origin: bottom center; }
      @keyframes grow {
        from { transform: scaleY(0); opacity: 0; }
        to   { transform: scaleY(1); opacity: 1; }
      }

      .node-glow { animation: nodeGlow 2.5s ease-in-out infinite alternate; }
      @keyframes nodeGlow {
        0%   { opacity: 0.7; }
        100% { opacity: 1.0; filter: drop-shadow(0 0 8px currentColor); }
      }

      .branch-draw {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: draw 1.5s ease-out forwards;
      }
      @keyframes draw {
        to { stroke-dashoffset: 0; }
      }

      text { font-family: 'JetBrains Mono', monospace; }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#020c14"/>
      <stop offset="100%" stop-color="#03111c"/>
    </linearGradient>
    <!-- Trunk gradient -->
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="50%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#1a3a2a"/>
    </linearGradient>
    <!-- Branch gradients by category -->
    <linearGradient id="reGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5cc"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="forGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7209b7"/>
      <stop offset="100%" stop-color="#b5179e"/>
    </linearGradient>
    <linearGradient id="pentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4361ee"/>
      <stop offset="100%" stop-color="#4cc9f0"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dc653"/>
      <stop offset="100%" stop-color="#80ffb4"/>
    </linearGradient>

    <filter id="glow-teal"><feGaussianBlur in="SourceGraphic" stdDeviation="4"/></filter>
    <filter id="glow-sm"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)" rx="12"/>

  <!-- Soil / ground line -->
  <ellipse cx="450" cy="490" rx="260" ry="18" fill="#0a2218" opacity="0.8"/>
  <rect x="200" y="488" width="500" height="32" fill="#020c14" rx="0"/>

  <!-- Root system (decorative) -->
  <g stroke="#1a3a2a" stroke-width="3" fill="none" opacity="0.6">
    <path d="M420,488 Q380,500 330,510"/>
    <path d="M450,490 Q450,505 450,515"/>
    <path d="M480,488 Q520,500 570,510"/>
    <path d="M400,492 Q360,508 310,520"/>
    <path d="M500,492 Q540,508 590,520"/>
  </g>

